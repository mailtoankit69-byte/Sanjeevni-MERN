AWSTemplateFormatVersion: '2010-09-09'
Description: 'Sanjeevi - Compute Stack: ALB, ACM, Launch Template, Auto Scaling Group'

Parameters:
  EnvironmentName:
    Type: String
    Default: production

  DomainName:
    Type: String
    Description: Root domain name (e.g., Sanjeevi.com)

  ApiSubdomain:
    Type: String
    Default: api

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI (latest)

  MinInstances:
    Type: Number
    Default: 2

  MaxInstances:
    Type: Number
    Default: 6

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 Hosted Zone ID for DNS validation

Resources:
  # ==================== SSM PARAMETER (CloudWatch Agent Config) ====================

  CloudWatchAgentConfig:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${EnvironmentName}/Sanjeevi/cloudwatch-config'
      Type: String
      Description: CloudWatch agent configuration for Sanjeevi backend instances
      Value: !Sub |
        {
          "agent": {
            "metrics_collection_interval": 60
          },
          "logs": {
            "logs_collected": {
              "files": {
                "collect_list": [
                  {
                    "file_path": "/var/log/messages",
                    "log_group_name": "/${EnvironmentName}/Sanjeevi/system",
                    "log_stream_name": "{instance_id}/messages"
                  },
                  {
                    "file_path": "/opt/Sanjeevi/backend/logs/*.log",
                    "log_group_name": "/${EnvironmentName}/Sanjeevi/app",
                    "log_stream_name": "{instance_id}/app"
                  }
                ]
              }
            }
          },
          "metrics": {
            "namespace": "${EnvironmentName}/Sanjeevi",
            "metrics_collected": {
              "mem": {
                "measurement": ["mem_used_percent"]
              },
              "disk": {
                "measurement": ["used_percent"],
                "resources": ["/"]
              }
            },
            "append_dimensions": {
              "AutoScalingGroupName": "${!aws:AutoScalingGroupName}",
              "InstanceId": "${!aws:InstanceId}"
            }
          }
        }

  # ==================== ACM CERTIFICATE (regional, for ALB) ====================

  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub '${ApiSubdomain}.${DomainName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub '${ApiSubdomain}.${DomainName}'
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-api-cert'

  # ==================== APPLICATION LOAD BALANCER ====================

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${EnvironmentName}-Sanjeevi-alb'
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - Fn::ImportValue: !Sub '${EnvironmentName}-ALBSecurityGroupId'
      Subnets:
        - Fn::ImportValue: !Sub '${EnvironmentName}-PublicSubnet1Id'
        - Fn::ImportValue: !Sub '${EnvironmentName}-PublicSubnet2Id'
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '60'
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Sanjeevi-alb'

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${EnvironmentName}-Sanjeevi-tg'
      VpcId:
        Fn::ImportValue: !Sub '${EnvironmentName}-VpcId'
      Protocol: HTTP
      Port: 4000
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /api/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Sanjeevi-tg'

  # HTTP listener → redirect to HTTPS
  ALBHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # HTTPS listener → forward to target group
  ALBHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref ApiCertificate
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ==================== LAUNCH TEMPLATE ====================

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${EnvironmentName}-Sanjeevi-lt'
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name:
            Fn::ImportValue: !Sub '${EnvironmentName}-EC2InstanceProfileName'
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${EnvironmentName}-AppSecurityGroupId'
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 1
          HttpEndpoint: enabled
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${EnvironmentName}-Sanjeevi-app'
              - Key: Environment
                Value: !Ref EnvironmentName
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail

            # Update system
            dnf update -y

            # Install Node.js 20 LTS via NodeSource
            # AL2023 has curl-minimal pre-installed; use it directly (no dnf install curl)
            curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
            dnf install -y nodejs

            # Install CodeDeploy agent
            dnf install -y ruby wget
            cd /tmp
            wget https://aws-codedeploy-${AWS::Region}.s3.${AWS::Region}.amazonaws.com/latest/install
            chmod +x ./install
            ./install auto
            systemctl enable codedeploy-agent
            systemctl start codedeploy-agent

            # Install CloudWatch agent
            dnf install -y amazon-cloudwatch-agent
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config -m ec2 -s \
              -c ssm:/${EnvironmentName}/Sanjeevi/cloudwatch-config

            # Create app directory
            mkdir -p /opt/Sanjeevi
            chown ec2-user:ec2-user /opt/Sanjeevi

            # Signal success
            echo "UserData completed successfully" > /var/log/userdata-status.log

  # ==================== AUTO SCALING GROUP ====================

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: CloudWatchAgentConfig
    Properties:
      AutoScalingGroupName: !Sub '${EnvironmentName}-Sanjeevi-asg'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: !Ref MinInstances
      MaxSize: !Ref MaxInstances
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub '${EnvironmentName}-PrivateAppSubnet1Id'
        - Fn::ImportValue: !Sub '${EnvironmentName}-PrivateAppSubnet2Id'
      TargetGroupARNs:
        - !Ref ALBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-Sanjeevi-app'
          PropagateAtLaunch: true
        - Key: Environment
          Value: !Ref EnvironmentName
          PropagateAtLaunch: true

  # ==================== SCALING POLICIES ====================

  CpuScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      EstimatedInstanceWarmup: 300
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70.0
        DisableScaleIn: false

  RequestCountScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    DependsOn: ALBHttpsListener
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      EstimatedInstanceWarmup: 300
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ALBRequestCountPerTarget
          ResourceLabel: !Sub
            - '${ALBFullName}/${TGFullName}'
            - ALBFullName: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
              TGFullName: !GetAtt ALBTargetGroup.TargetGroupFullName
        TargetValue: 1000
        DisableScaleIn: false

Outputs:
  ALBDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${EnvironmentName}-ALBDnsName'

  ALBHostedZoneId:
    Value: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID
    Export:
      Name: !Sub '${EnvironmentName}-ALBHostedZoneId'

  ALBArn:
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub '${EnvironmentName}-ALBArn'

  AutoScalingGroupName:
    Value: !Ref AutoScalingGroup
    Export:
      Name: !Sub '${EnvironmentName}-ASGName'

  TargetGroupArn:
    Value: !Ref ALBTargetGroup
    Export:
      Name: !Sub '${EnvironmentName}-TargetGroupArn'

  ALBFullName:
    Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
    Export:
      Name: !Sub '${EnvironmentName}-ALBFullName'

  TargetGroupFullName:
    Value: !GetAtt ALBTargetGroup.TargetGroupFullName
    Export:
      Name: !Sub '${EnvironmentName}-TargetGroupFullName'
