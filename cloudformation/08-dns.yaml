AWSTemplateFormatVersion: '2010-09-09'
Description: 'Sanjeevi - DNS Stack: Route 53 Records'

Parameters:
  EnvironmentName:
    Type: String
    Default: production

  DomainName:
    Type: String
    Description: Root domain name (e.g., Sanjeevi.com)

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 Hosted Zone ID

  FrontendSubdomain:
    Type: String
    Default: app

  AdminSubdomain:
    Type: String
    Default: admin

  ApiSubdomain:
    Type: String
    Default: api

Resources:
  # ==================== DNS RECORDS ====================

  # app.domain.com → CloudFront (frontend)
  FrontendDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${FrontendSubdomain}.${DomainName}'
      Type: A
      AliasTarget:
        DNSName:
          Fn::ImportValue: !Sub '${EnvironmentName}-FrontendDistributionDomain'
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront global hosted zone ID
        EvaluateTargetHealth: false

  # admin.domain.com → CloudFront (admin)
  AdminDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${AdminSubdomain}.${DomainName}'
      Type: A
      AliasTarget:
        DNSName:
          Fn::ImportValue: !Sub '${EnvironmentName}-AdminDistributionDomain'
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # api.domain.com → ALB (backend)
  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${ApiSubdomain}.${DomainName}'
      Type: A
      AliasTarget:
        DNSName:
          Fn::ImportValue: !Sub '${EnvironmentName}-ALBDnsName'
        HostedZoneId:
          Fn::ImportValue: !Sub '${EnvironmentName}-ALBHostedZoneId'
        EvaluateTargetHealth: true

Outputs:
  FrontendUrl:
    Value: !Sub 'https://${FrontendSubdomain}.${DomainName}'

  AdminUrl:
    Value: !Sub 'https://${AdminSubdomain}.${DomainName}'

  ApiUrl:
    Value: !Sub 'https://${ApiSubdomain}.${DomainName}'
